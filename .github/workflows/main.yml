name: Bygg og deploy

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CODEOWNERS'
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'

jobs:
  set_version:
    name: Set image name
    runs-on: ubuntu-latest
    steps:
      - name: create docker tag
        run: echo "TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
    outputs:
      image: spapi:${{ env.TAG }}

  build:
    permissions:
      contents: "read"
      id-token: "write"
    name: Build docker image
    runs-on: ubuntu-latest
    needs: set_version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21.x'
          cache: 'gradle'
      - name: Test and build
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build container image
        if: ${{ github.ref_name == 'main' }}
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: tbd
          tag: ${{ needs.set_version.outputs.image }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deployDev:
    name: Deploy to dev
    needs: [set_version, build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/application.yml
          VARS: src/main/resources/dev-nais.json
          IMAGE: ${{ needs.build.outputs.image }}

  deployProd:
    name: Deploy to prod
    needs: [set_version, build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/application.yml
          VARS: src/main/resources/prod-nais.json
          IMAGE: ${{ needs.build.outputs.image }}
